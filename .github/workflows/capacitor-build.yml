name: Build Capacitor Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Initialize Capacitor Project
        run: |
          # Create a dummy package.json if it doesn't exist
          if [ ! -f package.json ]; then
            npm init -y
          fi
          # Initialize Capacitor (App Name: MyApp, ID: com.example.app)
          npx cap init "MyCapacitorApp" "com.example.app" --web-dir www

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # Copy your index.html into the web directory
          cp index.html www/
          # Capacitor requires an app to have dependencies installed in the project
          npm install @capacitor/android

      - name: Add Android Platform
        run: npx cap add android

      - name: Copy Assets to Android
        run: npx cap copy android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
