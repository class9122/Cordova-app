name: Build Capacitor Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Required for Capacitor 8+

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Fixes "invalid source release: 21"

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest

      - name: Initialize Project & Web Assets
        run: |
          # Create package.json if it doesn't exist
          [ -f package.json ] || npm init -y
          
          # Initialize Capacitor with the latest defaults
          npx cap init "MyCapacitorApp" "com.example.app" --web-dir www
          
          # Setup the web folder and move your index.html
          mkdir -p www
          cp index.html www/
          
          # Install the Android platform package
          npm install @capacitor/android@latest

      - name: Add and Sync Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
