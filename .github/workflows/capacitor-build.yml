name: Build Capacitor APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v6

      # 2️⃣ Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      # 3️⃣ Install Capacitor CLI
      - name: Install Capacitor
        run: npm install @capacitor/cli -g

      # 4️⃣ Install project dependencies
      - name: Install Node Modules
        run: npm install

      # 5️⃣ Initialize Capacitor Android project if not exists
      - name: Initialize Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 6️⃣ Copy your existing index.html and assets
      - name: Add custom index.html and assets
        run: |
          mkdir -p www
          cp index.html www/index.html
          # Copy optional folders if exist
          if [ -d css ]; then cp -r css www/; fi
          if [ -d js ]; then cp -r js www/; fi
          if [ -d img ]; then cp -r img www/; fi

      # 7️⃣ Sync web assets to native Android project
      - name: Sync Capacitor
        run: npx cap sync android

      # 8️⃣ Build APK (debug)
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
          ls -l app/build/outputs/apk/debug/

      # 9️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: hello-capacitor-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
