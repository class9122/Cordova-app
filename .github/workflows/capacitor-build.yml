name: Build Capacitor APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3️⃣ Setup JDK 17 (needed for Android build)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4️⃣ Initialize Node project
      - name: Initialize Node project
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      # 5️⃣ Install Capacitor packages (all at once, saved to package.json)
      - name: Install Capacitor packages
        run: |
          npm install --save @capacitor/core @capacitor/cli @capacitor/android

      # 6️⃣ Initialize Capacitor project
      - name: Initialize Capacitor project
        run: |
          if [ ! -f capacitor.config.json ]; then
            npx cap init HelloWorld com.example.helloworld --web-dir=www
          fi

      # 7️⃣ Create www directory and copy web assets
      - name: Prepare web assets
        run: |
          mkdir -p www
          
          # Copy index.html
          if [ -f index.html ]; then
            cp index.html www/index.html
          else
            echo "<!DOCTYPE html>
          <html>
          <head>
            <meta charset='UTF-8'>
            <meta name='viewport' content='width=device-width, initial-scale=1.0'>
            <title>Hello Capacitor</title>
          </head>
          <body>
            <h1>Hello Capacitor!</h1>
            <p>This app was built with GitHub Actions.</p>
          </body>
          </html>" > www/index.html
          fi
          
          # Copy other assets if they exist
          [ -d css ] && cp -r css www/ || true
          [ -d js ] && cp -r js www/ || true
          [ -d img ] && cp -r img www/ || true
          [ -d assets ] && cp -r assets www/ || true
          
          echo "Contents of www directory:"
          ls -la www/

      # 8️⃣ Add Android platform
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 9️⃣ Sync web assets to native project
      - name: Sync Capacitor
        run: npx cap sync android

      # 🔟 Accept Android SDK licenses
      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" || true

      # 1️⃣1️⃣ Make gradlew executable and build APK
      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace
          
          echo "Build outputs:"
          ls -lh app/build/outputs/apk/debug/

      # 1️⃣2️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hello-capacitor-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 1️⃣3️⃣ Create release info (optional)
      - name: APK Info
        run: |
          echo "✅ APK build successful!"
          echo "📦 APK size: $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
          echo "📱 Package: com.example.helloworld"
