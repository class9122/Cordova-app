name: Build Capacitor APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v6

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Initialize Node project if missing
      - name: Initialize Node project
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      # 4️⃣ Install Capacitor CLI globally
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # 5️⃣ Install Capacitor core locally
      - name: Install Capacitor Core
        run: npm install @capacitor/core

      # 6️⃣ Initialize Capacitor project if missing
      - name: Initialize Capacitor project
        run: |
          if [ ! -f capacitor.config.json ]; then
            npx cap init HelloWorld com.example.helloworld
          fi

      # 7️⃣ Copy index.html and assets
      - name: Copy index.html and assets
        run: |
          mkdir -p www
          cp index.html www/index.html
          if [ -d css ]; then cp -r css www/; fi
          if [ -d js ]; then cp -r js www/; fi
          if [ -d img ]; then cp -r img www/; fi

      # 8️⃣ Install Android platform package
      - name: Install Capacitor Android
        run: npm install @capacitor/android

      # 9️⃣ Add Android platform folder if missing
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 🔟 Sync web assets to native project
      - name: Sync Capacitor
        run: npx cap sync android

      # 1️⃣1️⃣ Setup JDK 17 (matches Gradle & Capacitor recommendations)
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 1️⃣2️⃣ Force clean Gradle and use project-local cache
      - name: Build APK with local Gradle cache
        run: |
          cd android
          ./gradlew clean assembleDebug --no-daemon -g $GITHUB_WORKSPACE/.gradle
          ls -l app/build/outputs/apk/debug/

      # 1️⃣3️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: hello-capacitor-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
