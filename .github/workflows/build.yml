          path: hello-cordova/platforms/android/app/build/outputs/apk/debug/app-debug.apk

      # 9️⃣ Commit and push the Cordova project
      - name: Push Cordova project back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hello-cordova
          git commit -m "Add/update hello-cordova project via GitHub Actions" || echo "No changes to commit"
          git push origin main        run: |
