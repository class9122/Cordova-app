<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Modern To-Do</title>
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --accent: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .todo-item {
            transition: transform 0.2s ease;
        }

        .completed-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* Custom Checkbox */
        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-checkbox.checked {
            background: var(--accent);
        }

        .custom-checkbox svg {
            color: white;
            display: none;
        }

        .custom-checkbox.checked svg {
            display: block;
        }

        /* Input highlight */
        .input-focus:focus-within {
            ring: 2px solid var(--accent);
            border-color: transparent;
        }

        /* Safe area for mobile notched devices */
        .padding-safe {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-start padding-safe">

    <div id="app" class="w-full max-w-md mt-4 md:mt-10 opacity-0">
        <!-- Header -->
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Today</h1>
                <p id="current-date" class="text-slate-500 font-medium"></p>
            </div>
            <div class="h-12 w-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                <i data-lucide="calendar"></i>
            </div>
        </header>

        <!-- Stats Card -->
        <div class="glass-card rounded-3xl p-6 mb-8 flex justify-around items-center">
            <div class="text-center">
                <p id="total-count" class="text-2xl font-bold text-slate-800">0</p>
                <p class="text-xs uppercase tracking-wider text-slate-400 font-bold">Tasks</p>
            </div>
            <div class="h-10 w-[1px] bg-slate-200"></div>
            <div class="text-center">
                <p id="done-count" class="text-2xl font-bold text-indigo-600">0</p>
                <p class="text-xs uppercase tracking-wider text-slate-400 font-bold">Done</p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="glass-card rounded-2xl p-2 mb-6 flex items-center shadow-sm group input-focus">
            <input 
                type="text" 
                id="todo-input" 
                placeholder="What needs to be done?" 
                class="bg-transparent border-none focus:ring-0 flex-1 px-4 py-3 text-slate-700 placeholder-slate-400 font-medium outline-none"
            >
            <button 
                id="add-btn"
                class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition-colors shadow-md shadow-indigo-100"
            >
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-20 hidden">
            <div class="bg-white/50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="clipboard-list" class="w-10 h-10 text-slate-300"></i>
            </div>
            <p class="text-slate-400 font-medium">No tasks for today. Relax!</p>
        </div>

        <!-- Todo List -->
        <ul id="todo-list" class="space-y-4">
            <!-- Items generated by JS -->
        </ul>
    </div>

    <script>
        // State Management
        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        // DOM Elements
        const todoInput = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');
        const totalCount = document.getElementById('total-count');
        const doneCount = document.getElementById('done-count');
        const dateEl = document.getElementById('current-date');

        // Initialize Lucide Icons
        lucide.createIcons();

        // Set Date
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        dateEl.innerText = new Date().toLocaleDateString('en-US', options);

        // Entrance Animation
        window.onload = () => {
            gsap.to("#app", { opacity: 1, y: -20, duration: 0.8, ease: "power3.out" });
            renderTodos();
        };

        function updateStats() {
            totalCount.innerText = todos.length;
            doneCount.innerText = todos.filter(t => t.completed).length;
            
            if (todos.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }
        }

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
            updateStats();
        }

        function createTodoElement(todo) {
            const li = document.createElement('li');
            li.className = "todo-item glass-card rounded-2xl p-4 flex items-center gap-4 group";
            li.dataset.id = todo.id;

            li.innerHTML = `
                <div class="custom-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}')">
                    <i data-lucide="check" class="w-4 h-4"></i>
                </div>
                <span class="flex-1 font-medium text-slate-700 ${todo.completed ? 'completed-text' : ''}">
                    ${todo.text}
                </span>
                <button onclick="removeTodo('${todo.id}')" class="opacity-0 group-hover:opacity-100 p-2 text-slate-400 hover:text-red-500 transition-all">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;

            return li;
        }

        function renderTodos() {
            todoList.innerHTML = '';
            todos.forEach(todo => {
                const el = createTodoElement(todo);
                todoList.appendChild(el);
            });
            lucide.createIcons();
            updateStats();
            
            // Animation for list items
            gsap.from(".todo-item", {
                opacity: 0,
                x: -20,
                stagger: 0.1,
                duration: 0.4,
                ease: "back.out(1.7)"
            });
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) return;

            const newTodo = {
                id: Date.now().toString(),
                text: text,
                completed: false
            };

            todos.unshift(newTodo);
            saveTodos();
            todoInput.value = '';

            // Render and animate only the new item
            const el = createTodoElement(newTodo);
            todoList.prepend(el);
            lucide.createIcons();
            
            gsap.from(el, {
                height: 0,
                opacity: 0,
                paddingTop: 0,
                paddingBottom: 0,
                marginTop: 0,
                duration: 0.5,
                ease: "elastic.out(1, 0.8)",
                onComplete: () => {
                    el.style.height = 'auto';
                }
            });
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            todo.completed = !todo.completed;
            saveTodos();

            const el = document.querySelector(`[data-id="${id}"]`);
            const checkbox = el.querySelector('.custom-checkbox');
            const span = el.querySelector('span');

            if (todo.completed) {
                checkbox.classList.add('checked');
                span.classList.add('completed-text');
                gsap.to(checkbox, { scale: 1.2, duration: 0.1, yoyo: true, repeat: 1 });
            } else {
                checkbox.classList.remove('checked');
                span.classList.remove('completed-text');
            }
        }

        function removeTodo(id) {
            const el = document.querySelector(`[data-id="${id}"]`);
            
            gsap.to(el, {
                x: 100,
                opacity: 0,
                duration: 0.3,
                ease: "power3.in",
                onComplete: () => {
                    todos = todos.filter(t => t.id !== id);
                    saveTodos();
                    el.remove();
                    if (todos.length === 0) emptyState.classList.remove('hidden');
                }
            });
        }

        // Event Listeners
        addBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // Button Click Animation
        addBtn.addEventListener('mousedown', () => {
            gsap.to(addBtn, { scale: 0.9, duration: 0.1 });
        });
        addBtn.addEventListener('mouseup', () => {
            gsap.to(addBtn, { scale: 1, duration: 0.1 });
        });
    </script>
</body>
  </html>
